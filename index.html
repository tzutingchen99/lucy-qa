      content="關於自動化、AI 輔助測試，以及把測試寫成意圖而不是實作的筆記。"
    />

    <meta property="og:site_name" content="QA 筆記" />
    <meta property="og:title" content="QA 筆記" />

    <link rel="alternate" type="application/rss+xml" title="QA 筆記 RSS" href="feed.xml" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="apple-touch-icon" href="favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+TC:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script data-goatcounter="https://tzu.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
    <script>
      // Early theme detection to avoid flash
      (function () {
        var saved = localStorage.getItem("qa-theme");
        var prefersDark =
          window.matchMedia &&
          window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme =
          saved === "dark" || saved === "light"
            ? saved
            : prefersDark
            ? "dark"
            : "light";
        document.documentElement.dataset.theme = theme;
      })();
    </script>
  </head>
  <body>
    <div id="progress-bar" aria-hidden="true"></div>
    <div class="grid">
      <header class="strip" role="banner">
        <a href="./" class="strip__item strip__brand">QA / Lucy</a>
        <nav class="strip__nav" aria-label="Primary">
          <a href="#/" data-nav="home">Home</a>
          <a href="#/posts" data-nav="posts">Posts</a>
          <a href="#/about" data-nav="about">About</a>
          <a href="#/search" data-nav="search">Search</a>
        </nav>
        <div class="theme" role="group" aria-label="Theme">
          <button
            type="button"
            class="theme__btn"
            data-theme="light"
            aria-label="Light theme"
          >
            ○
          </button>
          <span class="theme__sep" aria-hidden="true">·</span>
          <button
            type="button"
            class="theme__btn"
            data-theme="dark"
            aria-label="Dark theme"
          >
            ●
          </button>
        </div>
      </header>

      <main id="main" class="main" tabindex="-1">
        <p class="loading">Loading…</p>
      </main>

      <footer class="strip strip--foot" role="contentinfo">
        <span class="strip__item">QA / Lucy</span>
        <a href="https://tzutingchen99.github.io/lucy-cv/" class="strip__item"
          >CV ↗</a
        >
        <a
          href="https://www.threads.com/@qauluru"
          target="_blank"
          rel="noopener"
          class="strip__item"
          >Threads ↗</a
        >
        <a href="feed.xml" class="strip__item">RSS ↗</a>
        <span id="today-views" class="strip__item" aria-live="polite"></span>
        <span id="month-views" class="strip__item" aria-live="polite"></span>
        <span class="strip__item strip__item--end">2026</span>
      </footer>
    </div>

    <button id="back-to-top" aria-label="回到頂部">↑</button>
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
    <script>window.Prism = window.Prism || {}; window.Prism.manual = true;</script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
    <script src="theme.js"></script>
    <script src="app.js"></script>
  </body>
</html>
